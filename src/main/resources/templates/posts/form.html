<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${post.id == null} ? '새 글 작성' : '게시글 수정'">게시글</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1 th:text="${post.id == null} ? '✏️ 새 글 작성' : '✏️ 게시글 수정'">게시글 작성</h1>

    <!-- 신규 작성 폼 -->
    <form th:if="${post.id == null}" th:action="@{/posts}" th:object="${post}" method="post">
        <div class="form-group">
            <label for="title">제목</label>
            <input type="text" id="title" th:field="*{title}" class="form-control"
                   placeholder="제목을 입력하세요">
            <span class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
        </div>
        <div class="form-group">
            <label for="author">작성자</label>
            <input type="text" id="author" th:field="*{author}" class="form-control"
                   placeholder="작성자를 입력하세요">
            <span class="error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></span>
        </div>
        <div class="form-group">
            <label for="content">내용</label>
            <textarea id="content" th:field="*{content}" class="form-control" rows="10"
                      placeholder="내용을 입력하세요"></textarea>
            <span class="error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></span>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">저장</button>
            <a th:href="@{/posts}" class="btn btn-secondary">취소</a>
        </div>
    </form>

    <!-- 수정 폼 -->
    <form th:if="${post.id != null}" th:action="@{/posts/{id}(id=${post.id})}" th:object="${post}" method="post">
        <div class="form-group">
            <label for="title-edit">제목</label>
            <input type="text" id="title-edit" th:field="*{title}" class="form-control"
                   placeholder="제목을 입력하세요">
            <span class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
        </div>
        <div class="form-group">
            <label for="author-edit">작성자</label>
            <input type="text" id="author-edit" th:field="*{author}" class="form-control"
                   placeholder="작성자를 입력하세요">
            <span class="error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></span>
        </div>
        <div class="form-group">
            <label for="content-edit">내용</label>
            <textarea id="content-edit" th:field="*{content}" class="form-control" rows="10"
                      placeholder="내용을 입력하세요"></textarea>
            <span class="error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></span>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">저장</button>
            <a th:href="@{/posts/{id}(id=${post.id})}" class="btn btn-secondary">취소</a>
        </div>
    </form>
</div>
</body>
</html>
