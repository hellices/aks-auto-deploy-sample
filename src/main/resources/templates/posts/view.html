<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${post.title}">게시글 상세</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>📄 게시글 상세</h1>

    <div class="post-view">
        <div class="post-header">
            <h2 th:text="${post.title}">제목</h2>
            <div class="post-meta">
                <span>작성자: <strong th:text="${post.author}">작성자</strong></span>
                <span>작성일: <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</span></span>
                <span th:if="${post.updatedAt != post.createdAt}">
                    수정일: <span th:text="${#temporals.format(post.updatedAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</span>
                </span>
            </div>
        </div>
        <div class="post-content" th:text="${post.content}">내용</div>
    </div>

    <div class="form-actions">
        <a th:href="@{/posts/{id}/edit(id=${post.id})}" class="btn btn-primary">✏️ 수정</a>
        <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" style="display:inline;"
              onsubmit="return confirm('정말 삭제하시겠습니까?');">
            <button type="submit" class="btn btn-danger">🗑️ 삭제</button>
        </form>
        <a th:href="@{/posts}" class="btn btn-secondary">← 목록</a>
    </div>
</div>
</body>
</html>
